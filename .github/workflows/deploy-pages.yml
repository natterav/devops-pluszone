
# URL: https://leodaniel-rgb.github.io/Avance-proyecto-PlusZone/
# Secrets en Settings → Secrets and variables → Actions → Secrets:
#   API_BASE_URL, SUPABASE_URL, SUPABASE_ANON_KEY

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPO_NAME: Avance-proyecto-PlusZone
  REPO_OWNER: leodaniel-rgb

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://github.com/natterav/devops-pluszone.git
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar artefacto para GitHub Pages
        run: |
          mkdir -p deploy
          cp -r client/* deploy/
          API_BASE="${{ secrets.API_BASE_URL }}"
          API_BASE="${API_BASE%/}"
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          cat > deploy/config.js << EOF
          // Inyectado en deploy (leodaniel-rgb/Avance-proyecto-PlusZone)
          window.API_BASE = '${API_BASE}';
          window.SUPABASE_URL = '${SUPABASE_URL}';
          window.SUPABASE_ANON_KEY = '${SUPABASE_ANON_KEY}';
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
