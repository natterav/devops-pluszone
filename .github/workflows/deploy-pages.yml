# Despliega el frontend (client/) en GitHub Pages.
# Repositorio: Avance-proyecto-PlusZone
# URL resultante: https://<owner>.github.io/Avance-proyecto-PlusZone/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPO_NAME: Avance-proyecto-PlusZone

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (client)
        uses: actions/upload-pages-artifact@v3
        with:
          path: client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
